<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday</title>

  <style>
  <body>

<div class="container">
  <img src="background.jpg">
  
  <button class="btn" onclick="goNext()">🎁 MỞ RA NÀO</button>
</div>

</body>
    body {
  margin: 0;
  background: #e9e4da;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* giống trang wish */
img {
  width: 100%;
  height: 100vh;
  object-fit: contain;
  background: #e9e4da;
}

/* nút */
.btn {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 40px;
  font-size: 20px;
  border-radius: 30px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  cursor: pointer;
}
    /* overlay làm nền tối nhẹ cho nổi nút */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
    }

    .btn {
      position: relative;
      z-index: 2;
      padding: 20px 50px;
      font-size: 24px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff6a00, #ffb347);
      color: white;
      cursor: pointer;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #ff6a00; }
      to { box-shadow: 0 0 25px #ffb347; }
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* hiệu ứng fade */
    .fade-out {
      animation: fadeOut 0.8s forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    /* emoji bay */
    .emoji {
      position: absolute;
      font-size: 24px;
      animation: fly 1s forwards;
    }

    @keyframes fly {
      to {
        transform: translateY(-150px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<button class="btn" onclick="goNext(event)">🎁 MỞ RA NÀO</button>

<script>
function goNext(e) {

  // bắn emoji 💥
  for(let i=0;i<15;i++){
    let emo = document.createElement("div");
    emo.className = "emoji";
    emo.innerHTML = ["🔥","✨","🎉","💥"][Math.floor(Math.random()*4)];
    emo.style.left = e.clientX + "px";
    emo.style.top = e.clientY + "px";
    document.body.appendChild(emo);
    setTimeout(()=>emo.remove(),1000);
  }

  // fade chuyển trang
  document.body.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href = "wish.html";
  },800);
}
</script>

</body>
</html>
