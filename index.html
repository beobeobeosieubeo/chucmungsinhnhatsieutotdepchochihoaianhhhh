<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  background: #e9e4da;
  overflow: hidden;
}

/* container */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* ảnh full KHÔNG bị cắt */
img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #e9e4da;
}

/* nút */
.btn {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  padding: 16px 36px;
  font-size: 20px;
  border-radius: 30px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <img src="background.jpg">

  <button class="btn" onclick="goNext()">🎁 MỞ RA NÀO</button>
</div>

<script>
function goNext() {
  window.location.href = "wish.html";
}
</script>

</body>
</html>
