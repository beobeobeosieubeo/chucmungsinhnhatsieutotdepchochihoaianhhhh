<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chúc mừng sinh nhật</title>

<style>
body {
  margin: 0;
  background: #e9e4da; /* nền nhẹ cho đẹp */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* container */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* ảnh KHÔNG zoom */
img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* hiện full ảnh */
}

/* overlay nhẹ cho đẹp */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.1);
}

/* nút nhạc */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 18px;
  border-radius: 25px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
  <img id="mainImg" src="wish.jpg">
  <div class="overlay"></div>
</div>

<!-- nhạc -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3">
</audio>

<button id="musicBtn">🎵 Bật nhạc</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

// bật/tắt nhạc
btn.onclick = function() {
  if (music.paused) {
    music.play();
    btn.innerText = "🔈 Tắt nhạc";
  } else {
    music.pause();
    btn.innerText = "🎵 Bật nhạc";
  }
}

// auto play sau lần click đầu
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });
</script>

</body>
</html>
