<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chúc mừng sinh nhật</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 25px;
      max-width: 700px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { font-size: 32px; margin: 5px; }
    p { font-size: 18px; line-height: 1.7; }

    /* sao bay nhẹ */
    .star {
      position: absolute;
      font-size: 20px;
      animation: float 5s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="star" style="left:10%; top:20%;">✨</div>
<div class="star" style="right:15%; top:30%;">✨</div>
<div class="star" style="left:30%; bottom:20%;">✨</div>

<div class="card">
  <h1>🎂 Chúc mừng sinh nhật 🎂</h1>
  <h2>Chị Hoài Anh 👑</h2>

  <p>
    Chúc chị bước sang tuổi 18 thật nhiều niềm vui ✨,
    luôn xinh đẹp ✨ và luôn tự tin trong mọi điều mình làm.
  </p>

  <p>
    Sắp tới thi chúc chị bình tĩnh, tự tin và đậu nv1 😎
  </p>

  <p>
    Mong rằng chặng đường phía trước sẽ mang đến cho chị
    thật nhiều điều tốt đẹp 🌷
  </p>

  <p>🥺</p>
</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

</body>
</html>
