<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chúc mừng sinh nhật</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #e9e4da;
}

/* container */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
  animation: fadeIn 1.5s ease;
}

/* fade */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ❌ KHÔNG zoom nữa */
img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* hiện full ảnh */
}

/* overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.2);
}

/* nút nhạc */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 18px;
  border-radius: 30px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  cursor: pointer;
}

/* sparkle */
.sparkle {
  position: absolute;
  font-size: 18px;
  animation: float 4s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-100vh); opacity: 0; }
}

/* boom */
.boom {
  position: absolute;
  font-size: 24px;
  animation: boom 1s forwards;
}

@keyframes boom {
  to {
    transform: translateY(-120px);
    opacity: 0;
  }
}
</style>

</head>

<body>

<div class="container">
  <img id="mainImg" src="wish.jpg">
  <div class="overlay"></div>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3">
</audio>

<button id="musicBtn">🎵 Bật nhạc</button>

<script>
const img = document.getElementById("mainImg");
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

// 💥 click vẫn nổ emoji
img.onclick = function(e) {
  for(let i=0;i<10;i++){
    let b = document.createElement("div");
    b.className = "boom";
    b.innerHTML = ["✨","🔥","💥"][Math.floor(Math.random()*3)];
    b.style.left = e.clientX + "px";
    b.style.top = e.clientY + "px";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),1000);
  }
}

// 🎵 nhạc
btn.onclick = function() {
  if (music.paused) {
    music.play();
    btn.innerText = "🔈 Tắt nhạc";
  } else {
    music.pause();
    btn.innerText = "🎵 Bật nhạc";
  }
}

// auto play sau click
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });

// ✨ sparkle giữ nguyên
setInterval(()=>{
  let s = document.createElement("div");
  s.className = "sparkle";
  s.innerHTML = "✨";
  s.style.left = Math.random()*100 + "vw";
  s.style.top = "100vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),4000);
},300);

</script>

</body>
</html>
